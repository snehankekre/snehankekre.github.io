site:
  name: Snehan Kekre
  site: 'https://snehankekre.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Snehan Kekre
    template: '%s · Snehan Kekre'
  description: 'Snehan Kekre is an open-source developer relations and documentation leader (Streamlit). Community, docs, and developer education, and a diver.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Snehan Kekre
    images:
      - url: '~/assets/images/og.png'
        width: 1200
        height: 630
    type: website
  twitter:
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-8DX64VZSF6'

ui:
  theme: 'light' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
