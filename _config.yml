# Syntax highlighting
highlighter:         pygments

# Permalinks
#
# Use of `relative_permalinks` ensures post links from the index work properly.
permalink:           pretty
relative_permalinks: false

# Setup
title:               Snehan Kekre
tagline:             Here I post my thoughts, experiments, experience.
# Assets
#
# We specify the directory for Jekyll so we can use @imports.
sass:
  sass_dir:          _scss
  style:            :compressed

description:      Here I post my thoughts, experiments, and experience.

# Owner/author information
owner:
  name:           Snehan Kekre
  avatar:         me.jpg
  bio:            "My bio"
  email:          snehan-at-minerva.kgi.edu.edu
  github:         snehankekre
  location:       "San Francisco, CA"

tools:
  standards:      "HTML, SCSS, Jekyll"
  software:       "git"

# Links to include in top navigation
# For external links add external: true
links:
  - title: Blog
    url: /blog
  - title: Design
    url: /design
  - title: Github
    url: https://github.com/snehankekre
    external: true
  - title : Resume
    url: /resume.pdf

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone:    America/New_York
future:      true
markdown:    kramdown

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  enable_coderay: false

  coderay:
    coderay_line_numbers:
    coderay_line_numbers_start: 1
    coderay_tab_width: 2
    coderay_bold_every: 10
    coderay_css: class

permalink: /:title

include: [".htaccess"]
exclude: ["lib", "config.rb", "Capfile", "config", "log", "Rakefile", "Rakefile.rb", "tmp"]

