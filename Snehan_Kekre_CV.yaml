cv:
  name: Snehan Kekre
  email: snehan.minerva@gmail.com
  phone: tel:+91-938-041-30-12
  location: India
  website: https://snehankekre.com
  social_networks:
    - network: LinkedIn
      username: snehankekre
    - network: GitHub
      username: snehankekre
  sections:
    summary:
      - Developer relations, documentation, and developer education leader with 8 years in
        open-source and AI developer tooling. Part of Streamlit's founding DevRel team (acquired
        by Snowflake for $800M); grew from sole technical writer to Technical Product Manager of
        the Streamlit open-source library (40k+ GitHub stars, 1M+ monthly active developers, 90%
        of the Fortune 50), ranking among its top-10 all-time contributors and shipping production
        Python and TypeScript. Previously Coursera's first-ever project instructor, with 40+
        hands-on courses and 290K+ enrollments. Builds documentation platforms, communities, and
        curricula that turn new users into experts.
    skills:
      - label: Writing & documentation
        details: technical writing, docs-as-code, information architecture, API reference,
          tutorials and guides, Markdown, MDX, Next.js, Sphinx, style guides, SEO
      - label: Code
        details: Python, TypeScript, React, Streamlit, Git, GitHub, Jupyter, pandas, scikit-learn,
          TensorFlow, Keras
      - label: DevRel & community
        details: community forums, Discord, Slack, GitHub support, conference talks, webinars,
          video, curriculum design, creator programs
      - label: Product
        details: roadmaps, product specs, prototyping, user research, telemetry and analytics,
          go-to-market, competitive analysis
      - label: AI
        details: GenAI product features, LLM-assisted authoring and coding workflows, documentation
          for AI agent platforms
    experience:
      - company: AstroBee
        position: Head of Documentation
        location: Remote, India
        start_date: 2025-06
        end_date: 2026-05
        highlights:
          - Built [docs.astrobee.ai](https://docs.astrobee.ai) from scratch for an AI agent
            platform and owned all of its content, including tutorials, guides, reference docs,
            and every demo asset the sales team pitched with.
          - Drove growth alongside docs, delivering blog posts, SEO, landing pages, outbound
            copy, and growth experiments with performance reporting.

      - company: Snowflake
        position: Technical Product Manager - Streamlit Open Source
        location: Remote, India
        start_date: 2023-04
        end_date: 2025-03
        highlights:
          - Joined Snowflake through its acquisition of Streamlit; responsible for the Streamlit
            open-source library (40k+ GitHub stars, 1M+ monthly active developers, used by 90%
            of the Fortune 50), working with a team of 2 PMs and 10 engineers.
          - Shipped features used by millions end to end as PM (spec, research, prototypes,
            launch), including [st.pills](https://github.com/streamlit/streamlit/pull/9283),
            [st.segmented_control](https://github.com/streamlit/streamlit/pull/9418),
            [st.feedback](https://github.com/streamlit/streamlit/pull/8915),
            [st.audio_input](https://github.com/streamlit/streamlit/pull/9111), chart
            [stacking](https://github.com/streamlit/streamlit/pull/8945) and
            [axis labels](https://github.com/streamlit/streamlit/pull/8846), video subtitles, and
            icon support across button elements.
          - Personally designed, coded, and merged features and fixes in Streamlit core (Python,
            TypeScript, React), including st.expander icons, media autoplay, markdown text
            highlighting, and theme-aware maps; top-10 all-time
            [contributor](https://github.com/streamlit/streamlit/graphs/contributors?from=2021-04-01&to=2024-10-31&type=c)
            with dozens of [merged PRs](https://github.com/streamlit/streamlit/pulls?q=is%3Apr+author%3Asnehankekre+is%3Amerged).
          - Defined Streamlit's long-term strategy and roadmap with fellow PMs and leadership,
            translating it into detailed requirements, wireframes, and prototypes.
          - Partnered with marketing on go-to-market planning across pricing, packaging,
            positioning, competitive analysis, and sales enablement.
          - Drove user research (interviews, surveys, usability studies) and turned insights into
            shipped product solutions.
          - Represented Streamlit publicly, speaking at live events, appearing in videos, and
            writing blog posts.

      - company: Snowflake
        position: Product Manager - Streamlit Documentation
        location: Remote, India
        start_date: 2022-04
        end_date: 2023-04
        highlights:
          - Owned [docs.streamlit.io](https://docs.streamlit.io) end to end (getting started,
            tutorials, API reference, search, knowledge base, telemetry); top contributor to the
            [docs repo](https://github.com/streamlit/docs/commits?author=snehankekre) with
            thousands of commits.
          - Managed a team of technical writers and content strategists while owning the platform
            engineering; defined metrics and built telemetry data apps to track the impact of
            content and engineering work.
          - Set the strategy for scaling docs with the product (features, components, Snowflake
            integration) and for meeting users beyond the site, in-product and while coding.

      - company: Streamlit
        position: Developer Advocate
        location: Remote, India
        start_date: 2021-04
        end_date: 2022-04
        highlights:
          - Part of Streamlit's founding DevRel team (second DevRel hire and sole technical
            writer), reporting to the co-founders and Head of DevRel; owned all
            [documentation](https://docs.streamlit.io/), tutorials, and guides, and was among the
            team of 50 [acquired by Snowflake for $800 million](https://techcrunch.com/2022/03/02/snowflake-acquires-streamlit-for-800m-to-help-customers-build-data-based-apps/).
          - Ran the Streamlit community forum and supported users across GitHub and social media
            as the go-to resource for users in trouble, resolving the majority of their issues and
            serving as the bridge between our users and the product and engineering teams.
          - Led development of a new documentation platform (with design and engineering) on
            Next.js, MDX, and Netlify, migrating all content off Sphinx and ReadTheDocs.
          - Designed Streamlit's education program, enabling adoption across classrooms, boot camps,
            and internships.
          - Built internal Streamlit apps and profiled telemetry to surface product and leadership
            insights; one app tracking cloud costs identified ~$100k in savings.

      - company: Coursera
        position: Machine Learning and Data Science Instructor
        location: Remote, India
        start_date: 2019-12
        end_date: 2021-04
        highlights:
          - Coursera's first-ever project instructor and author of the first Guided Project on
            the platform; built curricula, instructional content, and video for 40+ Guided
            Projects on machine learning, deep learning, and data visualization, reaching 290K+
            enrollments.
          - Taught Plotly/Seaborn, scikit-learn, H2O AutoML, TensorFlow/Keras (NLP and computer
            vision), BERT, TensorFlow Serving, feature engineering, and ML pipelines, supporting
            thousands of learners in the discussion forums.
          - Co-authored instructor onboarding docs and designed assessments for deeplearning.ai's
            TensorFlow - Data and Deployment Specialization.

      - company: Coursera
        position: Skills Consultant
        location: Remote, India
        start_date: 2020-10
        end_date: 2021-04
        highlights:
          - Built a 100%-accurate skill-to-content source of truth powering Coursera's Skills
            Graph, auditing 400 courses against the skills taxonomy to ensure dataset quality for
            downstream ML needs.

      - company: Rhyme.com (Acquired by Coursera)
        position: Machine Learning Instructor
        location: Mountain View, CA
        start_date: 2018-08
        end_date: 2020-10
        highlights:
          - Created a portfolio of 20+ interactive, hands-on projects on machine learning, deep
            learning, and data science that led Coursera to acquire the company.

    education:
      - institution: Minerva University
        area: Physics and Computer Science
        degree: BS
        start_date: 2015-08
        end_date: 2019-05

design:
  theme: sb2nov
  page:
    size: us-letter
    top_margin: 2cm
    bottom_margin: 2cm
    left_margin: 2cm
    right_margin: 2cm
    show_footer: true
    show_top_note: true
  colors:
    name: rgb(0, 79, 144)
    headline: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
  typography:
    alignment: justified
    font_family:
      body: Latin Modern Serif
      name: Latin Modern Serif
      headline: Latin Modern Serif
      connections: Latin Modern Serif
      section_titles: Latin Modern Serif
    font_size:
      body: 10pt
      name: 24pt
  links:
    show_external_link_icon: true
  header:
    space_below_name: 0.3cm
    space_below_connections: 0.3cm
    connections:
      show_icons: true
      separator: ''
      space_between_connections: 0.5cm
  section_titles:
    space_above: 0.3cm
    space_below: 0.2cm
  sections:
    space_between_regular_entries: 0.2cm
  entries:
    date_and_location_width: 4.5cm
    side_space: 0.2cm
    highlights:
      space_above: 0.1cm
      space_left: 0.4cm
      space_between_items: 0.1cm
  templates:
    footer: 'NAME - Page PAGE_NUMBER of TOTAL_PAGES'
    top_note: 'Last updated in CURRENT_DATE'
